name: AI Request
about: Natural language request for AI-assisted development or audit
labels: ["ai:triage"]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Write your request in natural language. No special prompt required.
      placeholder: "例如：请只读审计本仓库，不要修改代码；或者：请增加一个登录页面。"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - normal development
        - audit-only / read-only
        - architecture review only
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Extra Constraints
      description: Optional. Add business constraints, deployment constraints, or forbidden changes.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Optional. Codex can propose this if you leave it empty.
      placeholder: "- [ ] ..."
