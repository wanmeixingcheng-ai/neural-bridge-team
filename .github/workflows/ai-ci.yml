name: AI Workflow CI

"on":
  pull_request:
    branches: [main, master]
  push:
    branches-ignore: [main, master]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check
        continue-on-error: false

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  protect-workflow-files:
    name: Protect workflow files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Check protected files unchanged
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // 如果 PR 有 human-approved-workflow-change 标签，跳过检查
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const labels = pr.labels.map(l => l.name);
            if (labels.includes('human-approved-workflow-change')) {
              console.log('✅ human-approved-workflow-change label found. Skipping protected file check.');
              return;
            }

            const protectedFiles = [
              'AGENTS.md',
              'CLAUDE.md',
              'AI_WORKFLOW.md',
              'AUTOMATION_POLICY.md',
              'RISK_LEVELS.md',
              'PROJECT_CONSTRAINTS.md',
              'CI_REPAIR_POLICY.md',
              '.github/PULL_REQUEST_TEMPLATE.md',
              '.github/ISSUE_TEMPLATE/ai_task.md',
              '.github/workflows/ai-ci.yml',
            ];

            let changed = false;
            for (const file of protectedFiles) {
              const base = `base/${file}`;
              const head = `pr/${file}`;
              const baseExists = fs.existsSync(base);
              const headExists = fs.existsSync(head);
              if (!baseExists && headExists) {
                core.error(`Protected file created: ${file}`);
                changed = true;
                continue;
              }
              if (baseExists && !headExists) {
                core.error(`Protected file deleted: ${file}`);
                changed = true;
                continue;
              }
              if (!baseExists && !headExists) continue;
              try {
                execSync(`diff -q "${base}" "${head}"`);
              } catch {
                core.error(`Protected file modified: ${file}`);
                changed = true;
              }
            }

            if (changed) {
              core.setFailed(
                'Protected workflow files were modified without human approval.\n' +
                'If this is intentional, ask a human to add the label: human-approved-workflow-change'
              );
            } else {
              console.log('✅ All protected files are unchanged.');
            }

  check-risk-label:
    name: Check risk label
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check PR has risk label
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const labels = pr.labels.map(l => l.name);
            const hasRiskLabel = labels.some(l =>
              ['risk:low', 'risk:medium', 'risk:high'].includes(l)
            );
            if (!hasRiskLabel) {
              core.setFailed('PR must have a risk label: risk:low, risk:medium, or risk:high');
            } else {
              console.log('✅ Risk label found:', labels.filter(l => l.startsWith('risk:')));
            }
