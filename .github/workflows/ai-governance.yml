name: AI Governance

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check-risk-label:
    name: Check risk label
    runs-on: ubuntu-latest
    steps:
      - name: Check labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const labels = pr.labels.map(l => l.name);
            const risks = labels.filter(l => ['risk:low','risk:medium','risk:high'].includes(l));
            if (risks.length !== 1) {
              core.setFailed(`PR must have exactly one risk label. Found: ${risks.join(', ') || 'none'}`);
            }

  protect-workflow-files:
    name: Protect workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          path: pr
      - name: Check protected files
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const labels = pr.labels.map(l => l.name);
            if (labels.includes('human-approved-workflow-change')) return;
            const protectedFiles = [
              'AGENTS.md','CLAUDE.md','AI_WORKFLOW.md','NO_COPY_POLICY.md',
              'AUDIT_ONLY_POLICY.md','AUTOMATION_POLICY.md','PROJECT_CONSTRAINTS.md',
              'RISK_LEVELS.md','CI_REPAIR_POLICY.md','.github/workflows/ai-governance.yml'
            ];
            let changed = false;
            for (const file of protectedFiles) {
              const base = `base/${file}`;
              const head = `pr/${file}`;
              if (!fs.existsSync(base) && !fs.existsSync(head)) continue;
              if (!fs.existsSync(base) || !fs.existsSync(head)) {
                core.error(`Protected file created/deleted: ${file}`);
                changed = true;
                continue;
              }
              try { execSync(`diff -q "${base}" "${head}"`); }
              catch { core.error(`Protected file modified: ${file}`); changed = true; }
            }
            if (changed) core.setFailed('Protected workflow files changed without human-approved-workflow-change label.');
